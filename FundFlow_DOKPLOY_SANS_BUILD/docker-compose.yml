services:
  fundflow:
    image: python:3.11-alpine
    restart: unless-stopped
    working_dir: /opt/fundflow
    command: ["python", "/opt/fundflow/app.py", "--no-browser"]
    environment:
      PORT: "8000"
      DATA_DIR: "/app/data"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@fundflow.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-ChangeMe-2026!}"
      SEED_DEMO_USERS: "false"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    configs:
      - source: fundflow_app
        target: /opt/fundflow/app.py
        mode: 0444
    volumes:
      - fundflow_data:/app/data
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - dokploy-network

configs:
  fundflow_app:
    file: ./app.py

volumes:
  fundflow_data:

networks:
  dokploy-network:
    external: true
